<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Blue & Gold · 21st RSVP</title>
    <!-- Google Fonts: elegant serif & clean sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0B1A33 0%, #1C2F4A 100%);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }
        /* subtle gold pattern overlay */
        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path d="M20,20 L30,15 L40,20 L35,30 L40,40 L30,35 L20,40 L25,30 Z" fill="%23D4AF37"/><circle cx="70" cy="70" r="8" fill="%23D4AF37"/><circle cx="25" cy="75" r="5" fill="%23D4AF37"/><circle cx="80" cy="25" r="6" fill="%23D4AF37"/></svg>');
            background-size: 140px 140px;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            max-width: 800px;
            width: 100%;
            background: rgba(10, 25, 49, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 2rem 2rem 1.5rem 1.5rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 2px #D4AF37 inset, 0 0 15px #D4AF37;
            padding: 2.2rem 2.2rem 2.8rem;
            border: 1px solid #f5d742;
            position: relative;
            z-index: 2;
            transition: 0.3s;
        }

        /* decorative gold corners */
        .card::before {
            content: '';
            position: absolute;
            top: 10px; left: 10px; width: 50px; height: 50px;
            border-top: 3px solid #D4AF37;
            border-left: 3px solid #D4AF37;
            border-radius: 20px 0 0 0;
            opacity: 0.6;
        }
        .card::after {
            content: '';
            position: absolute;
            bottom: 10px; right: 10px; width: 50px; height: 50px;
            border-bottom: 3px solid #D4AF37;
            border-right: 3px solid #D4AF37;
            border-radius: 0 0 20px 0;
            opacity: 0.6;
        }

        h1, h2, h3 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            letter-spacing: 0.03em;
            color: #F8F2DE;
            text-shadow: 2px 2px 0 #00000040, 0 0 10px #D4AF37;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 i {
            font-size: 2.6rem;
            color: #D4AF37;
            filter: drop-shadow(0 0 6px gold);
        }

        .subhead {
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            color: #EBDCAD;
            border-top: 2px solid #D4AF37;
            border-bottom: 2px solid #D4AF37;
            padding: 0.7rem 0;
            margin: 1.2rem 0 1.8rem;
            font-size: 1.3rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: rgba(0, 20, 45, 0.5);
            box-shadow: 0 0 10px #D4AF3740;
        }

        .countdown-box {
            background: #0A1A2F;
            border-radius: 40px 40px 15px 15px;
            padding: 1.8rem 1rem;
            margin: 1.8rem 0 2rem;
            box-shadow: inset 0 -4px 0 #D4AF37, 0 15px 20px -10px #00000080, 0 0 15px #D4AF37;
            border: 1px solid #f3cd68;
        }

        .countdown-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #F8F2DE;
            text-align: center;
            margin-bottom: 0.8rem;
            font-weight: 400;
            font-family: 'Cormorant Garamond', serif;
        }

        .timer {
            display: flex;
            justify-content: center;
            gap: 1.5rem 2.5rem;
            flex-wrap: wrap;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
        }

        .time-num {
            font-size: 3.2rem;
            line-height: 1;
            font-weight: 700;
            color: #D4AF37;
            background: #0A1F3A;
            padding: 0.3rem 0.5rem;
            border-radius: 15px 5px 15px 5px;
            box-shadow: 0 5px 0 #6d5a2b, 0 0 15px #ffd966;
            width: 100%;
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            border: 1px solid #ffdf99;
        }

        .time-label {
            margin-top: 0.5rem;
            color: #EBDCAD;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* guest login panel - royal blue & gold */
        .guest-login-panel {
            background: #0D2140;
            border-radius: 30px 5px 30px 5px;
            padding: 1.8rem 2rem;
            border: 2px solid #D4AF37;
            margin: 1.8rem 0 2rem;
            box-shadow: 10px 10px 0 #00000050, 0 0 20px #D4AF37;
        }

        .guest-login-panel h3 {
            font-size: 2rem;
            font-weight: 600;
            color: #F8F2DE;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #D4AF37;
            padding-bottom: 0.6rem;
        }

        .guest-login-panel h3 i {
            font-size: 2rem;
            color: #D4AF37;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .form-group {
            flex: 1 1 200px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: #F2E5C4;
            margin-bottom: 0.4rem;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: #1B2F4A;
            border: 2px solid #D4AF37;
            border-radius: 25px 5px 25px 5px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            color: #F8F2DE;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #FFE484;
            box-shadow: 0 0 15px #FFD966;
            background: #1F3452;
        }
        .form-group input::placeholder {
            color: #9AB0C9;
        }

        .lock-btn {
            background: #D4AF37;
            border: none;
            color: #0B1A33;
            font-weight: 700;
            font-size: 1.3rem;
            padding: 0.8rem 2.2rem;
            border-radius: 40px 5px 40px 5px;
            cursor: pointer;
            box-shadow: 0 8px 0 #7E6227;
            transition: 0.08s linear;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 0.3rem;
            border: 1px solid #FFE484;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 1px;
        }
        .lock-btn i {
            color: #0B1A33;
        }
        .lock-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #7E6227;
        }
        .lock-btn:disabled {
            opacity: 0.6;
            transform: none;
            box-shadow: 0 5px 0 #7E6227;
            pointer-events: none;
        }

        .guest-info-display {
            background: #1D314B;
            border-radius: 20px;
            padding: 0.7rem 1.8rem;
            font-size: 1.2rem;
            display: inline-block;
            margin-top: 1rem;
            border: 2px solid #D4AF37;
            color: #FFE9B6;
            font-weight: 500;
            box-shadow: 0 0 15px #D4AF37;
        }

        /* RSVP panel */
        .rsvp-panel {
            background: #0D2140;
            border-radius: 30px 30px 30px 10px;
            padding: 1.8rem 2rem;
            border: 2px solid #D4AF37;
            margin: 2rem 0 1.7rem;
            box-shadow: 10px 10px 0 #00000050, 0 0 20px #D4AF37;
            opacity: 0.5;
            pointer-events: none;
            transition: 0.2s;
        }
        .rsvp-panel.unlocked {
            opacity: 1;
            pointer-events: all;
        }

        .question {
            font-size: 2.2rem;
            font-weight: 600;
            color: #F8F2DE;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
            font-family: 'Cormorant Garamond', serif;
        }
        .question i {
            font-size: 2.2rem;
            color: #D4AF37;
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            justify-content: center;
        }

        .rsvp-btn {
            background: #162B44;
            border: 2px solid #D4AF37;
            color: #F8F2DE;
            font-weight: 600;
            font-size: 1.7rem;
            padding: 0.8rem 2.5rem;
            border-radius: 50px 10px 50px 10px;
            cursor: pointer;
            box-shadow: 0 8px 0 #826A31;
            transition: 0.08s ease-out;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            flex: 0 1 auto;
            font-family: 'Cormorant Garamond', serif;
        }
        .rsvp-btn i {
            font-size: 1.6rem;
            color: #D4AF37;
        }
        .rsvp-btn.active {
            background: #2C3F5E;
            border-color: #FFE484;
            box-shadow: 0 3px 0 #D4AF37;
            transform: translateY(5px);
            color: #FFE9B6;
        }
        .rsvp-btn.other-btn {
            background: #1B314B;
        }

        .extra-note {
            margin-top: 2rem;
            padding: 1.3rem 1.2rem;
            background: #11243D;
            border-radius: 30px 5px 30px 5px;
            border-left: 8px solid #D4AF37;
            transition: opacity 0.25s;
            box-shadow: inset 0 0 10px #00000060;
        }
        .extra-note textarea {
            width: 100%;
            padding: 1rem;
            border: 2px dashed #D4AF37;
            background: #1F3857;
            border-radius: 15px 5px 15px 5px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            resize: vertical;
            color: #F2E5C4;
            outline: none;
        }
        .extra-note textarea:focus {
            border-style: solid;
            border-color: #FFD966;
            background: #25436B;
        }
        .extra-note label {
            display: block;
            margin-bottom: 0.7rem;
            font-weight: 500;
            color: #FFE6A6;
            font-size: 1.1rem;
        }

        .send-section {
            display: flex;
            justify-content: flex-end;
            margin-top: 1.8rem;
        }

        .submit-btn {
            background: #D4AF37;
            border: none;
            padding: 1rem 3rem;
            border-radius: 40px 5px 40px 5px;
            font-size: 1.6rem;
            font-weight: 700;
            color: #0A1A2F;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            box-shadow: 0 12px 0 #7E6227;
            transition: 0.08s;
            border: 1px solid #FFE484;
            font-family: 'Cormorant Garamond', serif;
        }
        .submit-btn i {
            color: #0A1A2F;
            font-size: 1.8rem;
        }
        .submit-btn:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #7E6227;
        }
        .submit-btn:disabled {
            opacity: 0.6;
            transform: none;
            box-shadow: 0 6px 0 #7E6227;
            pointer-events: none;
        }

        .feedback-message {
            font-size: 1.1rem;
            padding: 1rem;
            border-radius: 20px;
            background: #112951;
            color: #FFE6A6;
            border: 2px solid #D4AF37;
            margin-top: 1.8rem;
            text-align: center;
            font-weight: 500;
            display: none;
            box-shadow: 0 0 15px #D4AF37;
        }
        .feedback-message.show {
            display: block;
        }

        .footer-note {
            font-size: 1rem;
            text-align: center;
            color: #B8C9DD;
            margin-top: 2rem;
            border-top: 2px solid #D4AF37;
            padding-top: 1.3rem;
            font-weight: 400;
        }
        .footer-note i {
            margin: 0 6px;
            color: #D4AF37;
        }

        .hidden-iframe {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>
            <i class="fas fa-crown"></i> 
            21 · Royal celebration 
            <i class="fas fa-glass-cheers"></i>
        </h1>
        <div class="subhead">
            <i class="fas fa-calendar-alt"></i> RSVP by 18 dec 2026
        </div>

        <!-- COUNTDOWN TIMER -->
        <div class="countdown-box">
            <div class="countdown-title"><i class="fas fa-hourglass-half"></i> time to reply</div>
            <div class="timer" id="timer">
                <div class="time-unit"><span class="time-num" id="days">00</span><span class="time-label">days</span></div>
                <div class="time-unit"><span class="time-num" id="hours">00</span><span class="time-label">hours</span></div>
                <div class="time-unit"><span class="time-num" id="minutes">00</span><span class="time-label">mins</span></div>
                <div class="time-unit"><span class="time-num" id="seconds">00</span><span class="time-label">secs</span></div>
            </div>
        </div>

        <!-- GUEST LOGIN (first name, last name, relationship) -->
        <div class="guest-login-panel">
            <h3><i class="fas fa-lion"></i> your credentials</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName"><i class="fas fa-user"></i> first name</label>
                    <input type="text" id="firstName" placeholder="e.g., Elizabeth" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="lastName"><i class="fas fa-user"></i> last name</label>
                    <input type="text" id="lastName" placeholder="e.g., Windsor" autocomplete="off">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group" style="flex:2;">
                    <label for="relationship"><i class="fas fa-link"></i> i am...</label>
                    <select id="relationship">
                        <option value="" disabled selected>– select –</option>
                        <option value="family">family</option>
                        <option value="friend">friend</option>
                        <option value="family-friend">family-friend</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1; display: flex; align-items: flex-end;">
                    <button class="lock-btn" id="unlockRsvpBtn"><i class="fas fa-unlock-alt"></i> enter</button>
                </div>
            </div>
            <div id="guestDisplay" class="guest-info-display" style="display: none;">
                ✦ welcome, <span id="displayName"></span> · <span id="displayRelation"></span> ✦
            </div>
        </div>

        <!-- RSVP section with form to Google Sheets -->
        <div class="rsvp-panel" id="rsvpPanel">
            <form id="rsvpForm" action="https://script.google.com/macros/s/AKfycbxyqMreZ62mATioBhNJmqW-7VDIkBL9fdH09jPoUKmARcIhYWk7r6_wYZ1STi82vLPW6A/exec" method="POST" target="hiddenIframe">
                <!-- hidden fields populated via JS -->
                <input type="hidden" name="firstName" id="hiddenFirstName">
                <input type="hidden" name="lastName" id="hiddenLastName">
                <input type="hidden" name="relationship" id="hiddenRelationship">
                <input type="hidden" name="rsvp" id="hiddenRsvp">
                <input type="hidden" name="note" id="hiddenNote">
                <input type="hidden" name="timestamp" id="hiddenTimestamp">

                <div class="question">
                    <i class="fas fa-star"></i> will you attend?
                </div>
                <div class="btn-row">
                    <button class="rsvp-btn" type="button" id="btnYes"><i class="fas fa-check"></i> yes</button>
                    <button class="rsvp-btn" type="button" id="btnNo"><i class="fas fa-times"></i> no</button>
                    <button class="rsvp-btn other-btn" type="button" id="btnOther"><i class="fas fa-feather"></i> other</button>
                </div>

                <!-- note for 'other' -->
                <div class="extra-note" id="noteSection" style="opacity: 0; display: none;">
                    <label for="otherMessage"><i class="fas fa-pencil-alt"></i> royal message (optional):</label>
                    <textarea id="otherMessage" name="otherMessage" rows="2" placeholder="send your words..."></textarea>
                </div>

                <div class="send-section">
                    <button class="submit-btn" type="button" id="submitRSVP"><i class="fas fa-paper-plane"></i> send RSVP</button>
                </div>
            </form>
            <div class="feedback-message" id="feedback"></div>
        </div>

        <iframe name="hiddenIframe" class="hidden-iframe"></iframe>

        <div class="footer-note">
            <i class="fas fa-crown"></i> 18 march → 18 december  <i class="fas fa-crown"></i> private sheet
        </div>
    </div>

    <script>
        (function() {
            // ---------- COUNTDOWN (target: 18 dec 2026) ----------
            function updateCountdown() {
                const target = new Date(2026, 11, 18, 23, 59, 59);
                const now = new Date();
                const diffMs = target - now;
                if (diffMs <= 0) {
                    document.getElementById('days').innerText = '00';
                    document.getElementById('hours').innerText = '00';
                    document.getElementById('minutes').innerText = '00';
                    document.getElementById('seconds').innerText = '00';
                    return;
                }
                const totalSeconds = Math.floor(diffMs / 1000);
                const days = Math.floor(totalSeconds / 86400);
                const hours = Math.floor((totalSeconds % 86400) / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;
                document.getElementById('days').innerText = days < 10 ? '0' + days : days;
                document.getElementById('hours').innerText = hours < 10 ? '0' + hours : hours;
                document.getElementById('minutes').innerText = minutes < 10 ? '0' + minutes : minutes;
                document.getElementById('seconds').innerText = seconds < 10 ? '0' + seconds : seconds;
            }
            updateCountdown();
            setInterval(updateCountdown, 1000);

            // ---------- GUEST LOGIC (unlock) ----------
            const firstNameInput = document.getElementById('firstName');
            const lastNameInput = document.getElementById('lastName');
            const relationshipSelect = document.getElementById('relationship');
            const unlockBtn = document.getElementById('unlockRsvpBtn');
            const rsvpPanel = document.getElementById('rsvpPanel');
            const guestDisplay = document.getElementById('guestDisplay');
            const displayNameSpan = document.getElementById('displayName');
            const displayRelationSpan = document.getElementById('displayRelation');

            let guest = { firstName: '', lastName: '', relation: '' };

            function validateGuestInput() {
                const first = firstNameInput.value.trim();
                const last = lastNameInput.value.trim();
                const rel = relationshipSelect.value;
                return first !== '' && last !== '' && rel !== '' && rel !== null;
            }

            unlockBtn.addEventListener('click', function() {
                if (!validateGuestInput()) {
                    alert('👑 please fill in all fields (first, last, relationship).');
                    return;
                }
                guest.firstName = firstNameInput.value.trim();
                guest.lastName = lastNameInput.value.trim();
                guest.relation = relationshipSelect.value;

                displayNameSpan.innerText = guest.firstName + ' ' + guest.lastName;
                let relDisplay = guest.relation === 'family-friend' ? 'family‑friend' : guest.relation;
                displayRelationSpan.innerText = relDisplay;
                guestDisplay.style.display = 'inline-block';

                rsvpPanel.classList.add('unlocked');
                unlockBtn.disabled = true;
            });

            // ---------- RSVP selection ----------
            let selectedOption = null;   // 'yes', 'no', 'other'
            let otherNote = '';

            const btnYes = document.getElementById('btnYes');
            const btnNo = document.getElementById('btnNo');
            const btnOther = document.getElementById('btnOther');
            const noteSection = document.getElementById('noteSection');
            const otherMessageArea = document.getElementById('otherMessage');

            function setActive(option) {
                [btnYes, btnNo, btnOther].forEach(btn => btn.classList.remove('active'));
                if (option === 'yes') btnYes.classList.add('active');
                if (option === 'no') btnNo.classList.add('active');
                if (option === 'other') btnOther.classList.add('active');

                if (option === 'other') {
                    noteSection.style.display = 'block';
                    setTimeout(() => noteSection.style.opacity = '1', 10);
                } else {
                    noteSection.style.opacity = '0';
                    setTimeout(() => { if (selectedOption !== 'other') noteSection.style.display = 'none'; }, 250);
                }
            }

            btnYes.addEventListener('click', () => {
                if (!rsvpPanel.classList.contains('unlocked')) { alert('🔒 please enter your details first.'); return; }
                selectedOption = 'yes';
                setActive('yes');
            });
            btnNo.addEventListener('click', () => {
                if (!rsvpPanel.classList.contains('unlocked')) { alert('🔒 please enter your details first.'); return; }
                selectedOption = 'no';
                setActive('no');
            });
            btnOther.addEventListener('click', () => {
                if (!rsvpPanel.classList.contains('unlocked')) { alert('🔒 please enter your details first.'); return; }
                selectedOption = 'other';
                setActive('other');
            });

            otherMessageArea.addEventListener('input', (e) => {
                otherNote = e.target.value;
            });

            // ---------- FORM SUBMISSION (hidden iframe) ----------
            const submitBtn = document.getElementById('submitRSVP');
            const feedbackDiv = document.getElementById('feedback');
            const rsvpForm = document.getElementById('rsvpForm');

            const hiddenFirstName = document.getElementById('hiddenFirstName');
            const hiddenLastName = document.getElementById('hiddenLastName');
            const hiddenRelationship = document.getElementById('hiddenRelationship');
            const hiddenRsvp = document.getElementById('hiddenRsvp');
            const hiddenNote = document.getElementById('hiddenNote');
            const hiddenTimestamp = document.getElementById('hiddenTimestamp');

            const hiddenIframe = document.querySelector('iframe[name="hiddenIframe"]');
            hiddenIframe.addEventListener('load', function() {
                if (submitBtn.disabled) {
                    feedbackDiv.innerText = '✔️ RSVP delivered · thank you!';
                    feedbackDiv.classList.add('show');
                    setTimeout(() => feedbackDiv.classList.remove('show'), 4000);
                    submitBtn.disabled = false;
                }
            });

            submitBtn.addEventListener('click', function() {
                if (!rsvpPanel.classList.contains('unlocked') || !guest.firstName) {
                    feedbackDiv.innerText = '👑 please introduce yourself first.';
                    feedbackDiv.classList.add('show');
                    setTimeout(() => feedbackDiv.classList.remove('show'), 2500);
                    return;
                }
                if (!selectedOption) {
                    feedbackDiv.innerText = '✨ select yes, no or other.';
                    feedbackDiv.classList.add('show');
                    setTimeout(() => feedbackDiv.classList.remove('show'), 2500);
                    return;
                }

                let finalNote = '';
                if (selectedOption === 'other') {
                    finalNote = otherMessageArea.value.trim() || '(no message)';
                }

                // Fill hidden fields
                hiddenFirstName.value = guest.firstName;
                hiddenLastName.value = guest.lastName;
                hiddenRelationship.value = guest.relation;
                hiddenRsvp.value = selectedOption;
                hiddenNote.value = finalNote;
                hiddenTimestamp.value = new Date().toLocaleString('en-GB', { timeZone: 'UTC' });

                submitBtn.disabled = true;
                rsvpForm.submit();

                feedbackDiv.innerText = '⏳ sending your response ...';
                feedbackDiv.classList.add('show');

                // backup timeout
                setTimeout(() => {
                    if (submitBtn.disabled) {
                        submitBtn.disabled = false;
                        feedbackDiv.innerText = '✔️ done (sheet should be updated).';
                        setTimeout(() => feedbackDiv.classList.remove('show'), 2500);
                    }
                }, 3000);
            });

            // initial hide note
            noteSection.style.display = 'none';
            noteSection.style.opacity = '0';
        })();
    </script>
</body>
</html>
