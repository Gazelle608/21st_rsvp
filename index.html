<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formula 1 · 21st RSVP</title>
    <!-- Google Fonts: racing / bold style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Titillium+Web:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            font-family: 'Titillium Web', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            background-image: 
                linear-gradient(45deg, #2b2b2b 25%, transparent 25%),
                linear-gradient(-45deg, #2b2b2b 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #2b2b2b 75%),
                linear-gradient(-45deg, transparent 75%, #2b2b2b 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #1e1e1e;
            position: relative;
            overflow-x: hidden;
        }
        /* chequered flag overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(45deg, #000 0px, #000 20px, #ff0000 20px, #ff0000 40px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            max-width: 800px;
            width: 100%;
            background: rgba(10, 10, 15, 0.92);
            backdrop-filter: blur(4px);
            border-radius: 20px 20px 15px 15px;
            box-shadow: 0 30px 40px rgba(255, 0, 0, 0.2), 0 0 0 3px #ff0000, 0 0 20px #ff4d4d;
            padding: 2rem 2rem 2.5rem;
            border: 2px solid #cc0000;
            position: relative;
            z-index: 2;
        }

        /* racing stripe */
        .card::after {
            content: '';
            position: absolute;
            top: 15px; right: 30px; left: 30px;
            height: 6px;
            background: linear-gradient(90deg, transparent 0%, #ff0000 20%, #ffffff 40%, #ff0000 60%, #ffffff 80%, #ff0000 100%);
            border-radius: 10px;
            opacity: 0.6;
        }

        h1, h2, h3 {
            font-family: 'Racing Sans One', cursive;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 3px 3px 0 #cc0000, 0 0 10px #ff0000;
        }

        h1 {
            font-size: 3.2rem;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 i {
            font-size: 2.8rem;
            color: #ff3333;
            filter: drop-shadow(0 0 8px red);
        }

        .subhead {
            text-align: center;
            font-family: 'Titillium Web', sans-serif;
            font-weight: 700;
            color: #ffffff;
            background: #cc0000;
            border-radius: 30px;
            padding: 0.5rem 1rem;
            margin: 1rem 0 2rem;
            font-size: 1.3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #7a0000, 0 0 15px #ff8080;
            border: 1px solid #ff9999;
        }

        .countdown-box {
            background: #1f1f1f;
            border-radius: 50px 10px 50px 10px;
            padding: 1.8rem 1rem;
            margin: 1.8rem 0 2rem;
            box-shadow: inset 0 -5px 0 #cc0000, 0 15px 20px -10px #ff000080, 0 0 20px #ff0000;
            border: 2px solid #ff4d4d;
            background-image: repeating-linear-gradient(45deg, #2a2a2a 0px, #2a2a2a 5px, #1a1a1a 5px, #1a1a1a 10px);
        }

        .countdown-title {
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: #ffcccc;
            text-align: center;
            margin-bottom: 0.8rem;
            font-family: 'Racing Sans One', cursive;
        }

        .timer {
            display: flex;
            justify-content: center;
            gap: 1.5rem 2.5rem;
            flex-wrap: wrap;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 85px;
        }

        .time-num {
            font-size: 3.5rem;
            line-height: 1;
            font-weight: 900;
            color: #ff0000;
            background: #0a0a0a;
            padding: 0.2rem 0.5rem;
            border-radius: 10px 5px 10px 5px;
            box-shadow: 0 5px 0 #7a0000, 0 0 20px #ff6666;
            width: 100%;
            text-align: center;
            font-family: 'Racing Sans One', cursive;
            border: 2px solid #ff6666;
        }

        .time-label {
            margin-top: 0.5rem;
            color: #d4d4d4;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* guest login - f1 garage style */
        .guest-login-panel {
            background: #1f1f1f;
            border-radius: 30px 5px 30px 5px;
            padding: 1.8rem 2rem;
            border: 3px solid #cc0000;
            margin: 1.8rem 0 2rem;
            box-shadow: 10px 10px 0 #500000, 0 0 30px #ff0000;
            background-image: radial-gradient(circle at 20% 30%, #3a3a3a 0%, #1a1a1a 80%);
        }

        .guest-login-panel h3 {
            font-size: 2.2rem;
            color: #ffffff;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 4px solid #ff0000;
            padding-bottom: 0.5rem;
        }

        .guest-login-panel h3 i {
            font-size: 2rem;
            color: #ff3333;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .form-group {
            flex: 1 1 200px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            color: #ffcccc;
            margin-bottom: 0.3rem;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: #2b2b2b;
            border: 2px solid #ff4d4d;
            border-radius: 10px 2px 10px 2px;
            font-family: 'Titillium Web', sans-serif;
            font-size: 1rem;
            color: #ffffff;
            outline: none;
            transition: 0.2s;
            font-weight: 600;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #ff0000;
            box-shadow: 0 0 15px #ff6666;
            background: #3a3a3a;
        }
        .form-group input::placeholder {
            color: #a0a0a0;
        }

        .lock-btn {
            background: #cc0000;
            border: none;
            color: #ffffff;
            font-weight: 900;
            font-size: 1.4rem;
            padding: 0.8rem 2.2rem;
            border-radius: 50px 5px 50px 5px;
            cursor: pointer;
            box-shadow: 0 8px 0 #5a0000;
            transition: 0.08s linear;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 0.3rem;
            border: 2px solid #ff9999;
            font-family: 'Racing Sans One', cursive;
            letter-spacing: 2px;
        }
        .lock-btn i {
            color: white;
        }
        .lock-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #5a0000;
        }
        .lock-btn:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 5px 0 #5a0000;
            pointer-events: none;
        }

        .guest-info-display {
            background: #2b2b2b;
            border-radius: 50px;
            padding: 0.7rem 2rem;
            font-size: 1.2rem;
            display: inline-block;
            margin-top: 1rem;
            border: 3px solid #ff0000;
            color: #ffcccc;
            font-weight: 700;
            box-shadow: 0 0 15px red;
        }

        /* RSVP panel */
        .rsvp-panel {
            background: #1f1f1f;
            border-radius: 30px 5px 30px 5px;
            padding: 1.8rem 2rem;
            border: 3px solid #cc0000;
            margin: 2rem 0 1.7rem;
            box-shadow: 10px 10px 0 #500000, 0 0 30px #ff0000;
            opacity: 0.5;
            pointer-events: none;
            transition: 0.2s;
            background-image: repeating-linear-gradient(90deg, #1a1a1a 0px, #1a1a1a 5px, #252525 5px, #252525 10px);
        }
        .rsvp-panel.unlocked {
            opacity: 1;
            pointer-events: all;
        }

        .question {
            font-size: 2.2rem;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
            font-family: 'Racing Sans One', cursive;
        }
        .question i {
            font-size: 2.5rem;
            color: #ff0000;
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            justify-content: center;
        }

        .rsvp-btn {
            background: #2b2b2b;
            border: 3px solid #ff0000;
            color: #ffffff;
            font-weight: 900;
            font-size: 2rem;
            padding: 0.8rem 2.8rem;
            border-radius: 60px 5px 60px 5px;
            cursor: pointer;
            box-shadow: 0 8px 0 #7a0000, 0 0 15px #ff4d4d;
            transition: 0.08s ease-out;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            flex: 0 1 auto;
            font-family: 'Racing Sans One', cursive;
        }
        .rsvp-btn i {
            font-size: 2rem;
            color: #ff3333;
        }
        .rsvp-btn.active {
            background: #cc0000;
            border-color: #ffffff;
            box-shadow: 0 3px 0 #7a0000;
            transform: translateY(5px);
            color: #ffffff;
        }
        .rsvp-btn.active i {
            color: white;
        }
        .rsvp-btn.other-btn {
            background: #1f1f1f;
            border-color: #ff6666;
        }

        .extra-note {
            margin-top: 2rem;
            padding: 1.3rem 1.2rem;
            background: #262626;
            border-radius: 30px 5px 30px 5px;
            border-left: 10px solid #ff0000;
            transition: opacity 0.25s;
            box-shadow: inset 0 0 20px #1a0000;
        }
        .extra-note textarea {
            width: 100%;
            padding: 1rem;
            border: 3px dashed #ff4d4d;
            background: #1e1e1e;
            border-radius: 10px 2px 10px 2px;
            font-family: 'Titillium Web', sans-serif;
            font-size: 1.2rem;
            resize: vertical;
            color: #f2f2f2;
            outline: none;
            font-weight: 600;
        }
        .extra-note textarea:focus {
            border-style: solid;
            border-color: #ff0000;
            background: #2d2d2d;
        }
        .extra-note label {
            display: block;
            margin-bottom: 0.7rem;
            font-weight: 700;
            color: #ffb3b3;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .send-section {
            display: flex;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        .submit-btn {
            background: #cc0000;
            border: none;
            padding: 1rem 3rem;
            border-radius: 60px 5px 60px 5px;
            font-size: 2rem;
            font-weight: 900;
            color: #ffffff;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            box-shadow: 0 12px 0 #5a0000;
            transition: 0.08s;
            border: 2px solid #ffb3b3;
            font-family: 'Racing Sans One', cursive;
        }
        .submit-btn i {
            color: #ffffff;
            font-size: 2rem;
        }
        .submit-btn:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #5a0000;
        }
        .submit-btn:disabled {
            opacity: 0.6;
            transform: none;
            box-shadow: 0 6px 0 #5a0000;
            pointer-events: none;
        }

        .feedback-message {
            font-size: 1.2rem;
            padding: 1rem;
            border-radius: 10px;
            background: #2b2b2b;
            color: #ffb3b3;
            border: 3px solid #ff0000;
            margin-top: 1.8rem;
            text-align: center;
            font-weight: 700;
            display: none;
            box-shadow: 0 0 20px red;
        }
        .feedback-message.show {
            display: block;
        }

        .footer-note {
            font-size: 1.1rem;
            text-align: center;
            color: #b3b3b3;
            margin-top: 2rem;
            border-top: 4px solid #ff0000;
            padding-top: 1.3rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .footer-note i {
            margin: 0 8px;
            color: #ff0000;
        }

        .hidden-iframe {
            display: none;
        }

        /* speedometer accent */
        .card .speedmarks {
            position: absolute;
            bottom: 20px; left: 20px;
            font-size: 2rem;
            color: #ff0000;
            opacity: 0.2;
            transform: rotate(-15deg);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="speedmarks"><i class="fas fa-tachometer-alt"></i> <i class="fas fa-flag-checkered"></i></div>
        <h1>
            <i class="fas fa-flag-checkered"></i> 
            P1 · 21 
            <i class="fas fa-helmet-safety"></i>
        </h1>
        <div class="subhead">
            <i class="fas fa-stopwatch"></i> RSVP deadline · 18 dec 2026
        </div>

        <!-- COUNTDOWN TIMER (to 18 dec 2026) -->
        <div class="countdown-box">
            <div class="countdown-title"><i class="fas fa-clock"></i> grid start</div>
            <div class="timer" id="timer">
                <div class="time-unit"><span class="time-num" id="days">00</span><span class="time-label">days</span></div>
                <div class="time-unit"><span class="time-num" id="hours">00</span><span class="time-label">hrs</span></div>
                <div class="time-unit"><span class="time-num" id="minutes">00</span><span class="time-label">mins</span></div>
                <div class="time-unit"><span class="time-num" id="seconds">00</span><span class="time-label">secs</span></div>
            </div>
        </div>

        <!-- GUEST LOGIN (driver registration) -->
        <div class="guest-login-panel">
            <h3><i class="fas fa-helmet-safety"></i> driver card</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName"><i class="fas fa-user"></i> first name</label>
                    <input type="text" id="firstName" placeholder="e.g., Ayrton" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="lastName"><i class="fas fa-user"></i> last name</label>
                    <input type="text" id="lastName" placeholder="e.g., Senna" autocomplete="off">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group" style="flex:2;">
                    <label for="relationship"><i class="fas fa-flag"></i> team / relation</label>
                    <select id="relationship">
                        <option value="" disabled selected>– select category –</option>
                        <option value="family">family (home straight)</option>
                        <option value="friend">friend (paddock club)</option>
                        <option value="family-friend">family-friend (guest driver)</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1; display: flex; align-items: flex-end;">
                    <button class="lock-btn" id="unlockRsvpBtn"><i class="fas fa-unlock-alt"></i> enter pit</button>
                </div>
            </div>
            <div id="guestDisplay" class="guest-info-display" style="display: none;">
                <i class="fas fa-star"></i> <span id="displayName"></span> · <span id="displayRelation"></span> <i class="fas fa-star"></i>
            </div>
        </div>

        <!-- RSVP section (locked until login) -->
        <div class="rsvp-panel" id="rsvpPanel">
            <form id="rsvpForm" action="https://script.google.com/macros/s/AKfycbxyqMreZ62mATioBhNJmqW-7VDIkBL9fdH09jPoUKmARcIhYWk7r6_wYZ1STi82vLPW6A/exec" method="POST" target="hiddenIframe">
                <!-- hidden fields populated by JS -->
                <input type="hidden" name="firstName" id="hiddenFirstName">
                <input type="hidden" name="lastName" id="hiddenLastName">
                <input type="hidden" name="relationship" id="hiddenRelationship">
                <input type="hidden" name="rsvp" id="hiddenRsvp">
                <input type="hidden" name="note" id="hiddenNote">
                <input type="hidden" name="timestamp" id="hiddenTimestamp">

                <div class="question">
                    <i class="fas fa-flag-checkered"></i> start your engine?
                </div>
                <div class="btn-row">
                    <button class="rsvp-btn" type="button" id="btnYes"><i class="fas fa-check"></i> yes</button>
                    <button class="rsvp-btn" type="button" id="btnNo"><i class="fas fa-times"></i> no</button>
                    <button class="rsvp-btn other-btn" type="button" id="btnOther"><i class="fas fa-tools"></i> other</button>
                </div>

                <!-- note for 'other' -->
                <div class="extra-note" id="noteSection" style="opacity: 0; display: none;">
                    <label for="otherMessage"><i class="fas fa-pencil-alt"></i> team radio (optional):</label>
                    <textarea id="otherMessage" name="otherMessage" rows="2" placeholder="box box, send message..."></textarea>
                </div>

                <div class="send-section">
                    <button class="submit-btn" type="button" id="submitRSVP"><i class="fas fa-paper-plane"></i> send telemetry</button>
                </div>
            </form>
            <div class="feedback-message" id="feedback"></div>
        </div>

        <iframe name="hiddenIframe" class="hidden-iframe"></iframe>

        <div class="footer-note">
            <i class="fas fa-flag-checkered"></i> 18 march → 18 december  ·  only race engineer sees data  <i class="fas fa-flag-checkered"></i>
        </div>
    </div>

    <script>
        (function() {
            // ---------- COUNTDOWN (18 dec 2026) ----------
            function updateCountdown() {
                const target = new Date(2026, 11, 18, 23, 59, 59);
                const now = new Date();
                const diffMs = target - now;
                if (diffMs <= 0) {
                    document.getElementById('days').innerText = '00';
                    document.getElementById('hours').innerText = '00';
                    document.getElementById('minutes').innerText = '00';
                    document.getElementById('seconds').innerText = '00';
                    return;
                }
                const totalSeconds = Math.floor(diffMs / 1000);
                const days = Math.floor(totalSeconds / 86400);
                const hours = Math.floor((totalSeconds % 86400) / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;
                document.getElementById('days').innerText = days < 10 ? '0' + days : days;
                document.getElementById('hours').innerText = hours < 10 ? '0' + hours : hours;
                document.getElementById('minutes').innerText = minutes < 10 ? '0' + minutes : minutes;
                document.getElementById('seconds').innerText = seconds < 10 ? '0' + seconds : seconds;
            }
            updateCountdown();
            setInterval(updateCountdown, 1000);

            // ---------- GUEST LOGIN ----------
            const firstNameInput = document.getElementById('firstName');
            const lastNameInput = document.getElementById('lastName');
            const relationshipSelect = document.getElementById('relationship');
            const unlockBtn = document.getElementById('unlockRsvpBtn');
            const rsvpPanel = document.getElementById('rsvpPanel');
            const guestDisplay = document.getElementById('guestDisplay');
            const displayNameSpan = document.getElementById('displayName');
            const displayRelationSpan = document.getElementById('displayRelation');

            let guest = { firstName: '', lastName: '', relation: '' };

            function validateGuestInput() {
                const first = firstNameInput.value.trim();
                const last = lastNameInput.value.trim();
                const rel = relationshipSelect.value;
                return first !== '' && last !== '' && rel !== '' && rel !== null;
            }

            unlockBtn.addEventListener('click', function() {
                if (!validateGuestInput()) {
                    alert('🏁 please enter first name, last name, and select relationship.');
                    return;
                }
                guest.firstName = firstNameInput.value.trim();
                guest.lastName = lastNameInput.value.trim();
                guest.relation = relationshipSelect.value;

                displayNameSpan.innerText = guest.firstName + ' ' + guest.lastName;
                let relDisplay = guest.relation === 'family-friend' ? 'family‑friend' : guest.relation;
                displayRelationSpan.innerText = relDisplay;
                guestDisplay.style.display = 'inline-block';

                rsvpPanel.classList.add('unlocked');
                unlockBtn.disabled = true;
            });

            // ---------- RSVP selection ----------
            let selectedOption = null;   // 'yes', 'no', 'other'
            let otherNote = '';

            const btnYes = document.getElementById('btnYes');
            const btnNo = document.getElementById('btnNo');
            const btnOther = document.getElementById('btnOther');
            const noteSection = document.getElementById('noteSection');
            const otherMessageArea = document.getElementById('otherMessage');

            function setActive(option) {
                [btnYes, btnNo, btnOther].forEach(btn => btn.classList.remove('active'));
                if (option === 'yes') btnYes.classList.add('active');
                if (option === 'no') btnNo.classList.add('active');
                if (option === 'other') btnOther.classList.add('active');

                if (option === 'other') {
                    noteSection.style.display = 'block';
                    setTimeout(() => noteSection.style.opacity = '1', 10);
                } else {
                    noteSection.style.opacity = '0';
                    setTimeout(() => { if (selectedOption !== 'other') noteSection.style.display = 'none'; }, 250);
                }
            }

            btnYes.addEventListener('click', () => {
                if (!rsvpPanel.classList.contains('unlocked')) { alert('🔒 pit entry: register first.'); return; }
                selectedOption = 'yes';
                setActive('yes');
            });
            btnNo.addEventListener('click', () => {
                if (!rsvpPanel.classList.contains('unlocked')) { alert('🔒 pit entry: register first.'); return; }
                selectedOption = 'no';
                setActive('no');
            });
            btnOther.addEventListener('click', () => {
                if (!rsvpPanel.classList.contains('unlocked')) { alert('🔒 pit entry: register first.'); return; }
                selectedOption = 'other';
                setActive('other');
            });

            otherMessageArea.addEventListener('input', (e) => {
                otherNote = e.target.value;
            });

            // ---------- FORM SUBMISSION (hidden iframe, works with your google script) ----------
            const submitBtn = document.getElementById('submitRSVP');
            const feedbackDiv = document.getElementById('feedback');
            const rsvpForm = document.getElementById('rsvpForm');

            const hiddenFirstName = document.getElementById('hiddenFirstName');
            const hiddenLastName = document.getElementById('hiddenLastName');
            const hiddenRelationship = document.getElementById('hiddenRelationship');
            const hiddenRsvp = document.getElementById('hiddenRsvp');
            const hiddenNote = document.getElementById('hiddenNote');
            const hiddenTimestamp = document.getElementById('hiddenTimestamp');

            const hiddenIframe = document.querySelector('iframe[name="hiddenIframe"]');
            hiddenIframe.addEventListener('load', function() {
                if (submitBtn.disabled) {
                    feedbackDiv.innerText = '✔️ data logged · thank you, driver!';
                    feedbackDiv.classList.add('show');
                    setTimeout(() => feedbackDiv.classList.remove('show'), 4000);
                    submitBtn.disabled = false;
                }
            });

            submitBtn.addEventListener('click', function() {
                if (!rsvpPanel.classList.contains('unlocked') || !guest.firstName) {
                    feedbackDiv.innerText = '🏎️ please complete driver registration.';
                    feedbackDiv.classList.add('show');
                    setTimeout(() => feedbackDiv.classList.remove('show'), 2500);
                    return;
                }
                if (!selectedOption) {
                    feedbackDiv.innerText = '⏱️ select yes, no, or other.';
                    feedbackDiv.classList.add('show');
                    setTimeout(() => feedbackDiv.classList.remove('show'), 2500);
                    return;
                }

                let finalNote = '';
                if (selectedOption === 'other') {
                    finalNote = otherMessageArea.value.trim() || '(no radio message)';
                }

                // Fill hidden fields
                hiddenFirstName.value = guest.firstName;
                hiddenLastName.value = guest.lastName;
                hiddenRelationship.value = guest.relation;
                hiddenRsvp.value = selectedOption;
                hiddenNote.value = finalNote;
                hiddenTimestamp.value = new Date().toLocaleString('en-GB', { timeZone: 'UTC' });

                submitBtn.disabled = true;
                rsvpForm.submit();

                feedbackDiv.innerText = '⏳ transmitting telemetry ...';
                feedbackDiv.classList.add('show');

                // backup timeout (in case iframe load is silent)
                setTimeout(() => {
                    if (submitBtn.disabled) {
                        submitBtn.disabled = false;
                        feedbackDiv.innerText = '✔️ data sent (sheet updated).';
                        setTimeout(() => feedbackDiv.classList.remove('show'), 2500);
                    }
                }, 3500);
            });

            // initial hide note
            noteSection.style.display = 'none';
            noteSection.style.opacity = '0';
        })();
    </script>
</body>
</html>
